services:
  neo4j:
    image: neo4j:5
    container_name: cryptoanalyzer-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/neo4j_password_change_me
      # Optional: keep memory modest for laptops
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1024M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:

